services:
  seata-server:
    image: seataio/seata-server:1.6.1
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - SEATA_PORT=8091
      - STORE_MODE=file

  mysql-bank-a:
    image: mysql:8.0.32
    container_name: mysql-bank-a
    environment:
      - MYSQL_ROOT_PASSWORD=123456
    command: --default-authentication-plugin=mysql_native_password --default-time-zone='+08:00'
    volumes:
      - ./sql/bank_a.sql:/docker-entrypoint-initdb.d/bank_a.sql
    ports:
      - "3307:3306"

  mysql-bank-b:
    image: mysql:8.0.32
    container_name: mysql-bank-b
    environment:
      - MYSQL_ROOT_PASSWORD=123456
    command: --default-authentication-plugin=mysql_native_password --default-time-zone='+08:00'
    volumes:
      - ./sql/bank_b.sql:/docker-entrypoint-initdb.d/bank_b.sql
    ports:
      - "3308:3306"
